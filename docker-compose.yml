services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - AI_TOOLKIT_API_BASE=http://api:8000/api
    volumes:
      - model_cache:/root/.cache/huggingface
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - AI_TOOLKIT_API_BASE=http://api:8000/api
    depends_on:
      - api

volumes:
  model_cache:
